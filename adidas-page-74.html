<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adidas Deal Page 74</title>

<style>
body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

/* Teardrop */
.teardrop {
    width: 150px;
    height: 150px;
    background: black;
    color: white;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
    
    animation: pulse 2s infinite;
    transition: 0.3s;
}

/* Text */
.teardrop span {
    transform: rotate(45deg);
    font-size: 20px;
    font-weight: bold;
}

/* Hover */
.teardrop:hover {
    transform: rotate(-45deg) scale(1.15);
}

/* Pulse Animation */
@keyframes pulse {
    0% {
        box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }
    50% {
        box-shadow: 0 0 30px rgba(255,255,255,0.6);
    }
    100% {
        box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }
}
</style>
</head>

<body>

<a href="https://mavely.app.link/A7f9qOi7D1b" target="_blank" class="teardrop">
    <span>ADIDAS</span>
</a>

</body>
</html>
