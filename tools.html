<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdCamp | Premium Ad Analyzer</title>
    <style>
        :root {
            --bg: #0a0a0b;
            --panel: #14141a;
            --accent: #d4af37;
            --text-main: #ffffff;
            --text-dim: #a0a0a5;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* THE PAYWALL OVERLAY */
        #paywall {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 11, 0.85);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s ease;
        }

        .paywall-card {
            background: var(--panel);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid var(--accent);
            text-align: center;
            max-width: 500px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        .paywall-card h2 {
            font-size: 28px;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .paywall-card p {
            color: var(--text-dim);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .stripe-btn {
            background: var(--accent);
            color: #000;
            padding: 18px 35px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .stripe-btn:hover { transform: scale(1.05); background: #f1c40f; }

        /* THE TOOL (Hidden by default) */
        .container {
            width: 90%;
            max-width: 900px;
            background: var(--panel);
            border: 1px solid #2a2a30;
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            opacity: 0.3; /* Blurred look */
            filter: blur(5px);
            transition: 0.5s;
            pointer-events: none;
        }

        .unlocked .container {
            opacity: 1;
            filter: blur(0);
            pointer-events: all;
        }
        .unlocked #paywall {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        /* ... Rest of the CSS from previous version ... */
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 32px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tool-box { display: flex; flex-direction: column; gap: 20px; }
        textarea { width: 100%; height: 150px; background: #0f0f12; border: 1px solid #333; border-radius: 12px; padding: 20px; color: white; outline: none; box-sizing: border-box; }
        .btn-analyze { background: var(--accent); color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        #results { margin-top: 40px; display: none; }
        .score-card { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .metric { background: var(--glass); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .metric-val { display: block; font-size: 24px; font-weight: bold; color: var(--accent); }
        .metric-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }
        .critique { background: #1c1c24; padding: 20px; border-radius: 15px; border-left: 4px solid var(--accent); color: #ccc; }
    </style>
</head>
<body>

    <!-- PAYWALL OVERLAY -->
    <div id="paywall">
        <div class="paywall-card">
            <h2>Premium Access Required</h2>
            <p>Unlock the AdCamp High-Ticket Analyzer to discover the exact gaps in your ad copy and scale your ROI.</p>
            <!-- REPLACE '#' WITH YOUR STRIPE PAYMENT LINK -->
            <a href="https://buy.stripe.com/3cI6oH2FRdR37l36a22go07" id="stripe-link" class="stripe-btn">Unlock Now - $10</a>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>AdCamp | Ad Hook Analyzer</h1>
            <p style="color:var(--text-dim)">Premium Analysis for High-Ticket Conversion</p>
        </header>
        <div class="tool-box">
            <textarea id="adInput" placeholder="Paste your ad copy here..."></textarea>
            <button class="btn-analyze" onclick="analyzeAd()">Analyze Conversion Power</button>
        </div>
        <div id="results">
            <div class="score-card">
                <div class="metric"><span class="metric-val" id="hookScore">0%</span><span class="metric-label">Hook Strength</span></div>
                <div class="metric"><span class="metric-val" id="ctaScore">0%</span><span class="metric-label">CTA Clarity</span></div>
                <div class="metric"><span class="metric-val" id="overallScore">0%</span><span class="metric-label">Conversion Prob.</span></div>
            </div>
            <div class="critique" id="critiqueText"></div>
        </div>
    </div>

    <script>
        // 1. CHECK FOR PAYMENT SUCCESS
        window.onload = function() {
            // This looks at BOTH the search query (?) AND the hash fragment (#)
            const urlParams = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            
            if (urlParams.get('payment') === 'success' || hashParams.get('payment') === 'success') {
                document.body.classList.add('unlocked');
                console.log("Payment verified. Tool unlocked.");
            }
        };

        // 2. ANALYSIS LOGIC
        function analyzeAd() {
            const text = document.getElementById('adInput').value;
            if (!text) return alert("Please enter some ad copy first.");
            const btn = document.querySelector('.btn-analyze');
            btn,innerText = "Analyzing...";
            setTimeout(() => {
                const hookScore = Math.floor(Math.random() * (95 - 60) + 60);
                const ctaScore = Math.floor(Math.random() * (90 - 50) + 50);
                document.getElementById('hookScore').innerText = hookScore + "%";
                document.getElementById('ctaScore').innerText = ctaScore + "%";
                document.getElementById('overallScore').innerText = Math.floor((hookScore+ctaScore)/2) + "%";
                document.getElementById('critiqueText').innerText = "Your hook is strong, but the transformation is unclear. Focus more on the end result for the client.";
                document.getElementById('results').style.display = 'block';
                btn.innerText = "Analyze Conversion Power";
            }, 1500);
        }
    </script>
</body>
</html>
