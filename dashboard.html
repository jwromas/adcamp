<!DOCTYPE html>
<html>
<head>
<title>Market Agent Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

.box {
    background: #1f2937;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}

button {
    padding: 10px;
    background: #22c55e;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}
</style>
</head>

<body>

<h1>📊 Market Agent Dashboard</h1>

<div class="box" id="analytics">Loading analytics...</div>

<button onclick="loadDashboard()">Refresh</button>

<h2>💡 Chat Agent</h2>

<input id="msg" placeholder="Ask agent..." style="padding:10px; width:300px;">
<button onclick="send()">Send</button>

<pre id="chat"></pre>

<script>

async function loadDashboard() {
    const res = await fetch("http://127.0.0.1:5051/dashboard");
    const data = await res.json();

    document.getElementById("analytics").innerText =
        "Events: " + data.analytics?.total_events +
        "\nIdeas: " + data.total_ideas;
}

async function send() {
    const msg = document.getElementById("msg").value;

    const res = await fetch("http://127.0.0.1:5051/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    document.getElementById("chat").innerText = data.reply;
}

loadDashboard();

</script>

</body>
</html>
