<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Analytics Agent Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 800px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    background: #111827;
    text-align: center;
    font-weight: bold;
}

.chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.msg {
    margin: 10px 0;
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 70%;
    white-space: pre-wrap;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.bot {
    background: #1f2937;
    margin-right: auto;
}

.input-bar {
    display: flex;
    padding: 10px;
    background: #111827;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        📊 Analytics AI Agent
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-bar">
        <input id="input" placeholder="Ask your analytics agent..." />
        <button onclick="send()">Send</button>
    </div>

</div>

<script>
const chat = document.getElementById("chat");

function addMsg(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    const res = await fetch("http://127.0.0.1:5050/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    addMsg(data.reply || "No response", "bot");
}
</script>

</body>
</html>
